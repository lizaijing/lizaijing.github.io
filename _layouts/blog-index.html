---
layout: compress
---

<!doctype html>
<html
  lang="{{ page.lang | default: site.locale | default: 'en' }}"
  class="no-js"
>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body class="research-blog-page">
    {% include browser-upgrade.html %}

    <main class="research-blog-shell" role="main">
      {{ content }}
    </main>

    {% include scripts.html %}

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var root = document.querySelector("[data-blog-tabs]");

        if (!root) {
          return;
        }

        var tabs = Array.prototype.slice.call(
          root.querySelectorAll("[data-blog-language]")
        );

        var panels = Array.prototype.slice.call(
          root.querySelectorAll("[data-blog-panel]")
        );

        function activateLanguage(language, moveFocus) {
          tabs.forEach(function (tab) {
            var active = tab.getAttribute("data-blog-language") === language;

            tab.classList.toggle("is-active", active);
            tab.setAttribute("aria-selected", active ? "true" : "false");
            tab.setAttribute("tabindex", active ? "0" : "-1");

            if (active && moveFocus) {
              tab.focus();
            }
          });

          panels.forEach(function (panel) {
            var active = panel.getAttribute("data-blog-panel") === language;

            panel.classList.toggle("is-active", active);
            panel.hidden = !active;
          });

          try {
            window.localStorage.setItem("research-blog-language", language);
          } catch (error) {
            // localStorage may be unavailable.
          }
        }

        var initialLanguage = "zh";

        try {
          var savedLanguage = window.localStorage.getItem(
            "research-blog-language"
          );

          if (savedLanguage === "zh" || savedLanguage === "en") {
            initialLanguage = savedLanguage;
          }
        } catch (error) {
          // Keep Chinese as the default.
        }

        activateLanguage(initialLanguage, false);

        tabs.forEach(function (tab, index) {
          tab.addEventListener("click", function () {
            activateLanguage(
              tab.getAttribute("data-blog-language"),
              false
            );
          });

          tab.addEventListener("keydown", function (event) {
            var targetIndex = null;

            if (event.key === "ArrowRight" || event.key === "ArrowDown") {
              targetIndex = (index + 1) % tabs.length;
            }

            if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
              targetIndex = (index - 1 + tabs.length) % tabs.length;
            }

            if (event.key === "Home") {
              targetIndex = 0;
            }

            if (event.key === "End") {
              targetIndex = tabs.length - 1;
            }

            if (targetIndex !== null) {
              event.preventDefault();

              activateLanguage(
                tabs[targetIndex].getAttribute("data-blog-language"),
                true
              );
            }
          });
        });
      });
    </script>
  </body>
</html>
